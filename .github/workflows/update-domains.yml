name: Update Domains

on:
  schedule:
    - cron: '0 0 * * *' # 每天0点运行一次
  workflow_dispatch: # 手动触发

jobs:
  update-domains:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Append and deduplicate domains
      run: |
        # 将文件内容追加到 domains.txt
        cat aggregate/data/domains.txt >> aggregate/data/backup_domain
        cat aggregate/data/backup_domain >> aggregate/data/domains.txt
        # 去重
        sort -u aggregate/data/domains.txt -o aggregate/data/domains.txt
        sort -u aggregate/data/backup_domain -o aggregate/data/backup_domain

    - name: Commit changes
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git add aggregate/data/domains.txt
        git commit -m "Update domains.txt with new entries from backup_domain"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
